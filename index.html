<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streak Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-glow"></div>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="brand">
    <img src="logo.png" class="brand-logo">
    <div>
      <h1>STREAK</h1>
      <p>Dashboard</p>
    </div>
  </div>

  <div class="nav">
    <h4>MAIN</h4>
    <a class="active" data-page="Bot Settings">Bot Settings</a>
    <a data-page="Embeds">Embeds</a>
    <a data-page="Moderation">Moderation</a>
  </div>

</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <div class="topbar">
    <h2 id="pageTitle">Bot Settings</h2>
    <button class="save-btn">Save</button>
  </div>

  <div class="notice">
    Streak Dashboard (Beta)
  </div>

  <!-- PAGES -->

  <div class="page active" id="bot-settings">
    <div class="panel">
      <div class="panel-title">Bot Settings</div>
      <div class="setting-block">
        <h3>Bot Name</h3>
        <input placeholder="Bot Name">

        <h3>Prefix</h3>
        <input placeholder="!">

        <h3>Status</h3>
        <input placeholder="Watching Streak Dashboard">
      </div>
    </div>
  </div>

  <div class="page" id="embeds">
    <div class="panel">
      <div class="panel-title">Embeds</div>
      <div class="setting-block">
        <input placeholder="Title">
        <input placeholder="Description">
        <button>Create Embed</button>
      </div>
    </div>
  </div>

  <div class="page" id="moderation">
    <div class="panel">
      <div class="panel-title">Moderation</div>
      <div class="setting-block">
        <button>Kick</button>
        <button>Ban</button>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
